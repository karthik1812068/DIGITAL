# Netlify must serve the Vite *build* output, not the repo root.
# Wrong "Publish directory" → browser loads /src/main.jsx (missing) → blank page.

[build]
  command = "npm run build"
  publish = "dist"

# React Router (BrowserRouter): deep links and refresh need SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
